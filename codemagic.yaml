# Codemagic - Gestao YAHWEH (Flutter em flutter_app/)
#
# Assinatura iOS AUTOMATICA (recomendado): bloco ios_signing abaixo.
#   Na Codemagic: Team settings > codemagic.yaml settings > Code signing identities
#   - Certificado Apple Distribution (ex.: gestaoyahwehios) com visto verde no perfil
#   - Provisioning profile App Store para com.gestaoyahwehios.app (upload ou Fetch)
#   NAO precisa de CM_CERTIFICATE, CM_PROVISIONING_PROFILE, CERTIFICATE_PRIVATE_KEY.
#   Doc: https://docs.codemagic.io/yaml-code-signing/signing-ios/
#
# Opcional (override): se definir CM_CERTIFICATE + CM_PROVISIONING_PROFILE nos secrets,
#   o workflow usa P12 manual em vez do ios_signing da equipa.
#
# App Store Connect API (TestFlight / JWT): grupo appstore_credentials
#   APP_STORE_CONNECT_PRIVATE_KEY (.p8), KEY_IDENTIFIER, ISSUER_ID
#
# ID Apple: 6761656626 | Bundle: com.gestaoyahwehios.app | Team Xcode: 82RC6YL7KL
#
# Firebase App Distribution (opcional): grupo firebase_ipa_upload com FIREBASE_SERVICE_ACCOUNT_JSON

workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gestaoyahwehios.app
      vars:
        APP_STORE_APPLE_ID: 6761656626
        FIREBASE_IOS_APP_ID: "1:157235497908:ios:5c2a89577e79e39b4ac0e1"
        FIREBASE_APP_DISTRIBUTION_GROUPS: "testers"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          cd flutter_app
          flutter pub get
      - name: Verificar variaveis Apple (API + assinatura)
        script: |
          set -e
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Grupo appstore_credentials: APP_STORE_CONNECT_PRIVATE_KEY (.p8)}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?APP_STORE_CONNECT_KEY_IDENTIFIER (Key ID)}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?APP_STORE_CONNECT_ISSUER_ID (Issuer UUID)}"
          if [ -n "${CM_CERTIFICATE:-}" ]; then
            echo "Override: CM_CERTIFICATE definido — assinatura manual P12 (ignora ios_signing da equipa neste passo)."
            : "${CM_PROVISIONING_PROFILE:?CM_PROVISIONING_PROFILE (Base64 .mobileprovision)}"
          else
            echo "Assinatura: Codemagic ios_signing (app_store + com.gestaoyahwehios.app) — certificado/perfil da equipa."
          fi
      - name: CocoaPods
        script: |
          cd flutter_app/ios
          pod install
      - name: JWT App Store Connect (TestFlight) + keychain opcional P12
        script: |
          set -e
          echo "CM_IOS_SIGNING_REV=2026-04-team-ios_signing-native"
          _secret_to_pem_file() {
            local val="$1"
            local out="$2"
            printf '%b' "$val" | tr -d '\r' | perl -0777 -pe 's/^\xEF\xBB\xBF//; s/\A"(.*)"\z/$1/s; s/\A'\''(.*)'\''\z/$1/s' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "$out"
          }
          _looks_like_pem_api() { grep -qE 'BEGIN (EC )?PRIVATE KEY|BEGIN PRIVATE KEY' "$1"; }
          _norm_api() {
            _secret_to_pem_file "${APP_STORE_CONNECT_PRIVATE_KEY}" /tmp/_asc_raw.pem
            if _looks_like_pem_api /tmp/_asc_raw.pem; then
              cat /tmp/_asc_raw.pem > /tmp/_asc_ok.pem
            elif base64 -D < /tmp/_asc_raw.pem > /tmp/_asc_dec.pem 2>/dev/null && _looks_like_pem_api /tmp/_asc_dec.pem; then
              cat /tmp/_asc_dec.pem > /tmp/_asc_ok.pem
            else
              echo "ERRO: APP_STORE_CONNECT_PRIVATE_KEY nao e PEM valido (.p8 completo BEGIN/END)."
              exit 1
            fi
            export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/_asc_ok.pem)"
          }
          _persist_asc_pem_to_cm_env() {
            [ -n "${CM_ENV:-}" ] && [ -f /tmp/_asc_ok.pem ] || return 0
            {
              echo 'APP_STORE_CONNECT_PRIVATE_KEY<<CM_YAHWEH_ASC_PEM'
              cat /tmp/_asc_ok.pem
              echo 'CM_YAHWEH_ASC_PEM'
            } >> "$CM_ENV"
          }
          _norm_api
          _persist_asc_pem_to_cm_env
          if [ -n "${CM_CERTIFICATE:-}" ]; then
            keychain initialize
            echo "Instalando P12 manual (override CM_CERTIFICATE)..."
            PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$PROFILES_HOME"
            PROFILE_PATH="$(mktemp "$PROFILES_HOME"/cm_XXXXXX.mobileprovision)"
            printf '%s' "${CM_PROVISIONING_PROFILE}" | tr -d '\n\r ' | base64 -D > "$PROFILE_PATH"
            printf '%s' "${CM_CERTIFICATE}" | tr -d '\n\r ' | base64 -D > /tmp/cm_distribution.p12
            if [ -z "${CM_CERTIFICATE_PASSWORD:-}" ]; then
              keychain add-certificates --certificate /tmp/cm_distribution.p12
            else
              keychain add-certificates --certificate /tmp/cm_distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
            fi
          else
            echo "Sem CM_CERTIFICATE: Codemagic aplica ios_signing (sem keychain initialize manual — doc Codemagic)."
          fi
      - name: Code signing (Xcode)
        script: |
          cd flutter_app/ios
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          cd flutter_app
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Firebase App Distribution (FIREBASE_SERVICE_ACCOUNT_JSON)
        script: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON vazio - a saltar App Distribution."
            exit 0
          fi
          cd flutter_app
          IPA=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -z "$IPA" ]; then echo "Nenhum .ipa encontrado em build/ios/ipa"; exit 1; fi
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          npm install -g firebase-tools@13
          NOTES="Gestao YAHWEH CI build ${CM_BUILD_NUMBER:-?}"
          if [ -n "${APP_VERSION_SECRET:-}" ]; then
            NOTES="$APP_VERSION_SECRET"
          fi
          firebase appdistribution:distribute "$IPA" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "$FIREBASE_APP_DISTRIBUTION_GROUPS" \
            --release-notes "$NOTES"
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - raihom@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

# Android AAB local: .\scripts\build_android_play_store_aab.ps1
