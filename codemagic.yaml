# Codemagic - Gestao YAHWEH (Flutter em flutter_app/)
# Repositorio GitHub deve conter esta pasta na raiz (push deste monorepo ou espelho).
#
# 1) App Store Connect (OBRIGATORIO — sem isto o build falha):
#    Team settings > Integrations > App Store Connect > Add
#    Ao criar, defina o nome / "Reference name" EXATAMENTE como na linha
#    app_store_connect abaixo (por defeito: codemagic).
#
#    ERRO: integration "codemagic" does not exist
#    -> Ou nao ha integracao na Team com esse nome, ou o nome e outro (ex. com.gestaoyahwehios.app).
#    Correcao: renomeie a integracao na Codemagic para "codemagic" OU mude o valor
#    de app_store_connect para o nome real (case-sensitive).
# 2) Perfis: NAO usar bloco ios_signing aqui (falha se ainda nao ha .mobileprovision
#    carregado na Team). O script fetch-signing-files --create obtem/cria o perfil App Store.
# 3) NUNCA commite AuthKey_*.p8 nem .mobileprovision (pasta IOS/ — ver IOS/README_CREDENCIAIS.txt).
#    Perfil gestaoyahwehiosapp.mobileprovision: pode fazer upload na Codemagic > Code signing identities
#    ou confiar em fetch-signing-files --create no workflow.
#
# ID Apple (App Store Connect): 6761656626 | Bundle: com.gestaoyahwehios.app
#
# Variaveis como na app controle-totalapp (mesmos grupos / nomes):
#   Grupo firebase_ipa_upload: FIREBASE_SERVICE_ACCOUNT_JSON, APP_VERSION_SECRET
#   Grupo appstore_credentials: CERTIFICATE_PRIVATE_KEY
# Na app Gestao YAHWEH (Codemagic): crie os MESMOS grupos e variaveis OU copie os valores
# da outra app. Grupos ao nivel da Team partilham entre aplicacoes.

workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      # Nome identico ao da integracao em Team settings > Integrations (App Store Connect).
      app_store_connect: codemagic
    environment:
      groups:
        - firebase_ipa_upload
        - appstore_credentials
      vars:
        APP_STORE_APPLE_ID: 6761656626
        # App iOS no Firebase (App Distribution); mesmo valor em firebase_options.dart
        FIREBASE_IOS_APP_ID: "1:157235497908:ios:5c2a89577e79e39b4ac0e1"
        # Grupo de testadores no Firebase App Distribution (ajuste na Console se necessario)
        FIREBASE_APP_DISTRIBUTION_GROUPS: "testers"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          cd flutter_app
          flutter pub get
      - name: CocoaPods
        script: |
          cd flutter_app/ios
          pod install
      - name: Keychain e perfis Apple (API Key + CERTIFICATE_PRIVATE_KEY)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.gestaoyahwehios.app \
            --type IOS_APP_STORE \
            --create
      - name: Instalar certificados no keychain
        script: keychain add-certificates
      - name: Code signing (Xcode)
        script: |
          cd flutter_app/ios
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          cd flutter_app
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Firebase App Distribution (FIREBASE_SERVICE_ACCOUNT_JSON)
        script: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON vazio - a saltar App Distribution."
            exit 0
          fi
          cd flutter_app
          IPA=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -z "$IPA" ]; then echo "Nenhum .ipa encontrado em build/ios/ipa"; exit 1; fi
          # JSON completo da conta de servico (texto). Se guardou em base64 na Codemagic, faca decode aqui.
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          npm install -g firebase-tools@13
          NOTES="Gestao YAHWEH CI build ${CM_BUILD_NUMBER:-?}"
          if [ -n "${APP_VERSION_SECRET:-}" ]; then
            NOTES="$APP_VERSION_SECRET"
          fi
          firebase appdistribution:distribute "$IPA" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "$FIREBASE_APP_DISTRIBUTION_GROUPS" \
            --release-notes "$NOTES"
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - raihom@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true

# Android AAB local: .\scripts\build_android_play_store_aab.ps1 (keystore fora do Git).
