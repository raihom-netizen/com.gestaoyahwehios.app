# Codemagic - Gestao YAHWEH (Flutter em flutter_app/)
#
# Assinatura iOS: secrets no grupo appstore_credentials (evita "No matching profiles" da equipa).
#   CM_CERTIFICATE          — Apple Distribution .p12 em Base64 (uma linha)
#   CM_PROVISIONING_PROFILE — .mobileprovision App Store p/ com.gestaoyahwehios.app em Base64
#   CM_CERTIFICATE_PASSWORD — password do .p12 (opcional, secret)
# Gerar Base64 no Mac: cat ficheiro.p12 | base64 | pbcopy  (idem para .mobileprovision)
#
# Sem ios_signing por bundle: a Codemagic falha se Code signing identities nao tiver perfil App Store.
#
# App Store Connect API (TestFlight / JWT): mesmo grupo
#   APP_STORE_CONNECT_PRIVATE_KEY (.p8), KEY_IDENTIFIER, ISSUER_ID
#
# ID Apple: 6761656626 | Bundle: com.gestaoyahwehios.app | Team Xcode: 82RC6YL7KL
#
# ExportOptions (CI): gerado em /tmp/ExportOptions.plist a partir do .mobileprovision (teamID + nome do perfil).
#   Local: ajuste flutter_app/ios/ExportOptions.plist — o valor em provisioningProfiles deve ser o "Name" exacto
#   do perfil App Store (igual ao que PlistBuddy lê do .mobileprovision).
#
# Checklist credenciais (Codemagic > Team applications > Secrets > appstore_credentials):
#   CM_CERTIFICATE (P12 Distribution Base64), CM_PROVISIONING_PROFILE (mobileprovision Base64 uma linha),
#   CM_CERTIFICATE_PASSWORD se o P12 tiver senha, APP_STORE_CONNECT_* (API Key .p8 + Key ID + Issuer).
#   Se "Code signing" terminar em poucos segundos sem erro, confira se xcode-project use-profiles aplicou
#   perfis (ver passo seguinte: identidades de assinatura).
#
# Firebase App Distribution (opcional): grupo firebase_ipa_upload com FIREBASE_SERVICE_ACCOUNT_JSON
#
# IMPORTANTE: no Codemagic, use "codemagic.yaml no repositório" (não duplicar estes passos no editor
# da web); senão o CI corre scripts antigos e falha com "nenhum .ipa em flutter_app/build/ios/ipa".
#
# ─── Erro: exportArchive Provisioning profile "..." doesn't include signing certificate "Apple Distribution: ..." ───
# Não é bug de versão Flutter: o .mobileprovision foi gerado sem o mesmo certificado "Apple Distribution"
# que está no P12 (CM_CERTIFICATE), ou o P12 foi renovado e o perfil ficou antigo.
# Corrigir em developer.apple.com:
#   1) Profiles → perfil App Store de com.gestaoyahwehios.app → Edit → em "Certificates" marque o
#      Apple Distribution que corresponde ao .p12 exportado do Keychain (equipa 82RC6YL7KL).
#   2) Save → Download → novo ficheiro .mobileprovision.
#   3) Codemagic → Secrets (appstore_credentials) → CM_PROVISIONING_PROFILE = Base64 do NOVO perfil (uma linha).
# Se criou novo certificado Distribution: exporte novo .p12 e atualize CM_CERTIFICATE também.
# Versão/build no IPA vêm do pubspec (passo "flutter build ipa" usa --build-name / --build-number).

workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    # Pods + cache CocoaPods reduzem tempo entre builds (Dependency caching).
    cache:
      cache_paths:
        - flutter_app/ios/Pods
        - $HOME/Library/Caches/CocoaPods
    environment:
      groups:
        - appstore_credentials
      vars:
        APP_STORE_APPLE_ID: 6761656626
        FIREBASE_IOS_APP_ID: "1:157235497908:ios:5c2a89577e79e39b4ac0e1"
        FIREBASE_APP_DISTRIBUTION_GROUPS: "testers"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Detectar layout (monorepo flutter_app/ vs Flutter na raiz)
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          if [ -f flutter_app/pubspec.yaml ]; then
            echo mono > /tmp/cm_yw_layout
            echo "CM_YW_LAYOUT=mono → Flutter em $ROOT/flutter_app"
          elif [ -f pubspec.yaml ]; then
            echo root > /tmp/cm_yw_layout
            echo "CM_YW_LAYOUT=root → Flutter na raiz $ROOT"
          else
            echo "ERRO: pubspec.yaml nao encontrado em $ROOT nem $ROOT/flutter_app/"
            ls -la
            exit 1
          fi
      - name: Flutter pub get
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          case "$(cat /tmp/cm_yw_layout)" in mono) cd flutter_app ;; root) ;; *) echo "ERRO: /tmp/cm_yw_layout ausente"; exit 1 ;; esac
          flutter pub get
      - name: Verificar variaveis Apple (API + assinatura)
        script: |
          set -e
          # Codemagic UI: o nome correcto do secret e CM_CERTIFICATE (P12 Distribution em Base64).
          # Se so existir CERTIFICATE_PRIVATE_KEY no grupo, reutilizamos (mesmo valor esperado: Base64 do .p12).
          if [ -z "${CM_CERTIFICATE:-}" ] && [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            export CM_CERTIFICATE="$CERTIFICATE_PRIVATE_KEY"
            echo "AVISO: CM_CERTIFICATE vazio — a usar CERTIFICATE_PRIVATE_KEY. Renomeie o secret para CM_CERTIFICATE no Codemagic."
          fi
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?Grupo appstore_credentials: APP_STORE_CONNECT_PRIVATE_KEY (.p8)}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?APP_STORE_CONNECT_KEY_IDENTIFIER (Key ID)}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?APP_STORE_CONNECT_ISSUER_ID (Issuer UUID)}"
          : "${CM_CERTIFICATE:?Defina CM_CERTIFICATE (P12 Apple Distribution em Base64) no grupo appstore_credentials}"
          : "${CM_PROVISIONING_PROFILE:?Defina CM_PROVISIONING_PROFILE (perfil App Store .mobileprovision em Base64)}"
          _CM_PROV_COMPACT="$(printf '%s' "${CM_PROVISIONING_PROFILE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_PROV_COMPACT}" ]; then
            echo "ERRO: CM_PROVISIONING_PROFILE vazio apos normalizar (so espacos/quebras?)."
            echo "  Codemagic > Team applications > Secrets > grupo appstore_credentials — nome EXACTO: CM_PROVISIONING_PROFILE"
            echo "  Valor = UMA linha Base64 do ficheiro .mobileprovision (binario), NAO o XML aberto no editor."
            exit 1
          fi
          if ! printf '%s' "${_CM_PROV_COMPACT}" | base64 -D > /tmp/_cm_verify_prov.bin 2>/tmp/_cm_verify_prov.err; then
            echo "ERRO: CM_PROVISIONING_PROFILE nao decodifica em Base64 valido (corrija o secret antes do CocoaPods)."
            cat /tmp/_cm_verify_prov.err 2>/dev/null || true
            echo ""
            echo "Como gerar: Mac: base64 -i SeuPerfil.mobileprovision | tr -d '\n' | pbcopy"
            echo "  Windows (PowerShell): [Convert]::ToBase64String([IO.File]::ReadAllBytes('C:\\caminho\\ficheiro.mobileprovision'))"
            exit 1
          fi
          if [ ! -s /tmp/_cm_verify_prov.bin ]; then
            echo "ERRO: CM_PROVISIONING_PROFILE decodifica para ficheiro vazio."
            exit 1
          fi
          _CM_P12_COMPACT="$(printf '%s' "${CM_CERTIFICATE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_P12_COMPACT}" ]; then
            echo "ERRO: CM_CERTIFICATE vazio apos normalizar."
            exit 1
          fi
          if ! printf '%s' "${_CM_P12_COMPACT}" | base64 -D > /tmp/_cm_verify_p12.bin 2>/tmp/_cm_verify_p12.err; then
            echo "ERRO: CM_CERTIFICATE (P12) nao decodifica em Base64 valido."
            cat /tmp/_cm_verify_p12.err 2>/dev/null || true
            exit 1
          fi
          if [ ! -s /tmp/_cm_verify_p12.bin ]; then
            echo "ERRO: CM_CERTIFICATE decodifica para ficheiro vazio."
            exit 1
          fi
          echo "OK: secrets P12 + provisioning decodificam (bytes prov=$(wc -c < /tmp/_cm_verify_prov.bin) p12=$(wc -c < /tmp/_cm_verify_p12.bin))."
      - name: CocoaPods
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          case "$(cat /tmp/cm_yw_layout)" in mono) cd flutter_app/ios ;; root) cd ios ;; *) echo "ERRO: layout"; exit 1 ;; esac
          pod install
      - name: JWT App Store Connect + keychain P12 e perfil App Store
        script: |
          set -e
          if [ -z "${CM_CERTIFICATE:-}" ] && [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            export CM_CERTIFICATE="$CERTIFICATE_PRIVATE_KEY"
          fi
          echo "CM_IOS_SIGNING_REV=2026-04-no-export-pem-persist-end"
          _secret_to_pem_file() {
            local val="$1"
            local out="$2"
            printf '%b' "$val" | tr -d '\r' | perl -0777 -pe 's/^\xEF\xBB\xBF//; s/\A"(.*)"\z/$1/s; s/\A'\''(.*)'\''\z/$1/s' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "$out"
          }
          _looks_like_pem_api() { grep -qE 'BEGIN (EC )?PRIVATE KEY|BEGIN PRIVATE KEY' "$1"; }
          _norm_api() {
            _secret_to_pem_file "${APP_STORE_CONNECT_PRIVATE_KEY}" /tmp/_asc_raw.pem
            if [ ! -s /tmp/_asc_raw.pem ]; then
              echo "ERRO: APP_STORE_CONNECT_PRIVATE_KEY vazio ou sumiu ao gravar /tmp/_asc_raw.pem."
              echo "  No Codemagic: grupo appstore_credentials, secret com o .p8 completo (BEGIN PRIVATE KEY ... END) ou Base64 desse PEM."
              exit 1
            fi
            if _looks_like_pem_api /tmp/_asc_raw.pem; then
              cat /tmp/_asc_raw.pem > /tmp/_asc_ok.pem
            elif base64 -D < /tmp/_asc_raw.pem > /tmp/_asc_dec.pem 2>/tmp/_asc_b64.err && [ -s /tmp/_asc_dec.pem ] && _looks_like_pem_api /tmp/_asc_dec.pem; then
              cat /tmp/_asc_dec.pem > /tmp/_asc_ok.pem
            else
              echo "ERRO: APP_STORE_CONNECT_PRIVATE_KEY nao e PEM .p8 valido nem Base64 de PEM."
              [ -s /tmp/_asc_b64.err ] && cat /tmp/_asc_b64.err
              exit 1
            fi
            # NUNCA exportar PEM multilinha neste passo: o Codemagic regrava o ambiente em CM_ENV e pode
            # abrir APP_STORE_CONNECT_PRIVATE_KEY<<... sem fechar -> "not closed with delimiter".
            unset APP_STORE_CONNECT_PRIVATE_KEY || true
          }
          _persist_asc_pem_to_cm_env() {
            [ -n "${CM_ENV:-}" ] && [ -f /tmp/_asc_ok.pem ] || return 0
            _ASC_DELIM="CMGYYWHASCPEM594E2F1END"
            {
              echo "APP_STORE_CONNECT_PRIVATE_KEY<<${_ASC_DELIM}"
              cat /tmp/_asc_ok.pem
              printf '\n%s\n' "${_ASC_DELIM}"
            } >> "$CM_ENV"
          }
          _norm_api
          keychain initialize
          # Nao usar tr com espaco: se o secret tiver so espacos/newlines, base64 recebe vazio -> "(null): error decoding".
          _CM_PROV_COMPACT="$(printf '%s' "${CM_PROVISIONING_PROFILE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_PROV_COMPACT}" ]; then
            echo "ERRO: CM_PROVISIONING_PROFILE vazio apos normalizar."
            echo "  Colar no Codemagic o .mobileprovision em UMA linha Base64: cat perfil.mobileprovision | base64 | pbcopy"
            exit 1
          fi
          if ! printf '%s' "${_CM_PROV_COMPACT}" | base64 -D > /tmp/cm_raw.mobileprovision 2>/tmp/_prov_b64.err; then
            echo "ERRO: CM_PROVISIONING_PROFILE nao decodifica em Base64 valido."
            cat /tmp/_prov_b64.err 2>/dev/null || true
            echo "  Regrave o secret no Codemagic (grupo appstore_credentials). Use Base64 do .mobileprovision binario, uma linha."
            echo "  Mac: base64 -i perfil.mobileprovision | tr -d '\n' | pbcopy"
            echo "  Win: [Convert]::ToBase64String([IO.File]::ReadAllBytes('...mobileprovision'))"
            exit 1
          fi
          if [ ! -s /tmp/cm_raw.mobileprovision ]; then
            echo "ERRO: perfil decodificado vazio (verifique o Base64 do .mobileprovision)."
            exit 1
          fi
          security cms -D -i /tmp/cm_raw.mobileprovision > /tmp/cm_prov.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/cm_prov.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/cm_prov.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' /tmp/cm_prov.plist)
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp /tmp/cm_raw.mobileprovision "${PROFILES_HOME}/${PROFILE_UUID}.mobileprovision"
          _CM_P12_COMPACT="$(printf '%s' "${CM_CERTIFICATE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_P12_COMPACT}" ]; then
            echo "ERRO: CM_CERTIFICATE vazio apos normalizar."
            echo "  cat AppleDistribution.p12 | base64 | pbcopy  (uma linha, grupo appstore_credentials)"
            exit 1
          fi
          if ! printf '%s' "${_CM_P12_COMPACT}" | base64 -D > /tmp/cm_distribution.p12 2>/tmp/_p12_b64.err; then
            echo "ERRO: CM_CERTIFICATE (P12) nao decodifica em Base64 valido."
            cat /tmp/_p12_b64.err 2>/dev/null || true
            exit 1
          fi
          if [ ! -s /tmp/cm_distribution.p12 ]; then
            echo "ERRO: P12 decodificado vazio."
            exit 1
          fi
          if [ -z "${CM_CERTIFICATE_PASSWORD:-}" ]; then
            keychain add-certificates --certificate /tmp/cm_distribution.p12
          else
            keychain add-certificates --certificate /tmp/cm_distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          fi
          export CM_EXPORT_PROFILE_NAME="$PROFILE_NAME"
          export CM_EXPORT_TEAM_ID="$TEAM_ID"
          python3 << 'PY'
          import os, plistlib
          team = os.environ["CM_EXPORT_TEAM_ID"]
          name = os.environ["CM_EXPORT_PROFILE_NAME"]
          data = {
              "method": "app-store",
              "signingStyle": "manual",
              "teamID": team,
              "uploadSymbols": True,
              "provisioningProfiles": {"com.gestaoyahwehios.app": name},
          }
          with open("/tmp/ExportOptions.plist", "wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          PY
          echo "Perfil: name=${PROFILE_NAME} uuid=${PROFILE_UUID} team=${TEAM_ID}"
          _persist_asc_pem_to_cm_env
      - name: Code signing (Xcode)
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          case "$(cat /tmp/cm_yw_layout)" in mono) cd flutter_app/ios ;; root) cd ios ;; *) echo "ERRO: layout"; exit 1 ;; esac
          xcode-project use-profiles
          echo "--- Identidades de assinatura (esperado: Apple Distribution + perfil App Store) ---"
          security find-identity -v -p codesigning | head -40 || true
      - name: Flutter build IPA
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          case "$(cat /tmp/cm_yw_layout)" in mono) cd flutter_app ;; root) ;; *) echo "ERRO: layout"; exit 1 ;; esac
          FLUTTER_PWD="$(pwd)"
          echo "Flutter project dir: $FLUTTER_PWD FLUTTER_BUILD_DIR=${FLUTTER_BUILD_DIR:-<default>}"
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//;s/[[:space:]]*$//')"
          BUILD_NAME="${VERSION_LINE%%+*}"
          if [ -z "$BUILD_NAME" ]; then
            echo "ERRO: nao foi possivel ler version: do pubspec.yaml"
            exit 1
          fi
          if [ -n "${CM_BUILD_NUMBER:-}" ]; then
            BN="$CM_BUILD_NUMBER"
          else
            BN="${VERSION_LINE##*+}"
            echo "AVISO: CM_BUILD_NUMBER vazio — a usar sufixo + do pubspec: $BN"
          fi
          if [ -z "$BN" ]; then
            BN="1"
            echo "AVISO: build number vazio — a usar 1"
          fi
          echo "flutter build ipa --build-name=$BUILD_NAME --build-number=$BN (evita Redundant Build no ASC)"
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BN" \
            --export-options-plist=/tmp/ExportOptions.plist
          BD="${FLUTTER_BUILD_DIR:-build}"
          if [ "${BD#/}" != "$BD" ]; then
            IPA_DIR_BD="$BD/ios/ipa"
          else
            IPA_DIR_BD="$FLUTTER_PWD/$BD/ios/ipa"
          fi
          IPA_PATH=""
          # Codemagic por vezes define FLUTTER_BUILD_DIR na raiz do clone: o .ipa sai em ROOT/build/ios/ipa,
          # nao em flutter_app/build/ios/ipa — procurar em todos os candidatos antes de falhar.
          for trydir in "$IPA_DIR_BD" "$FLUTTER_PWD/build/ios/ipa" "$ROOT/build/ios/ipa" "$ROOT/flutter_app/build/ios/ipa"; do
            if [ -z "$trydir" ] || [ ! -d "$trydir" ]; then
              continue
            fi
            IPA_PATH=$(find "$trydir" -maxdepth 1 -name "*.ipa" -type f 2>/dev/null | head -n 1)
            if [ -n "$IPA_PATH" ] && [ -f "$IPA_PATH" ]; then
              break
            fi
          done
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            IPA_PATH=$(find "$ROOT" -type f -name "*.ipa" -not -path "*/.git/*" -not -path "*/.dart_tool/*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "ERRO: flutter build ipa terminou sem .ipa (export falhou ou caminho de saida mudou)."
            echo "--- candidatos ---"
            for trydir in "$IPA_DIR_BD" "$FLUTTER_PWD/build/ios/ipa" "$ROOT/build/ios/ipa"; do
              echo "dir=$trydir"; ls -la "$trydir" 2>/dev/null || true
            done
            echo "--- find *.ipa sob $ROOT (max 40) ---"
            find "$ROOT" -name "*.ipa" -type f 2>/dev/null | head -40 || true
            exit 1
          fi
          ABS_IPA="$(cd "$(dirname "$IPA_PATH")" && pwd)/$(basename "$IPA_PATH")"
          printf '%s\n' "$ABS_IPA" > "$FLUTTER_PWD/.cm_last_ipa_path"
          printf '%s\n' "$ABS_IPA" > "$ROOT/.cm_yw_last_ipa_path"
          mkdir -p "$ROOT/build/ios/ipa" "$FLUTTER_PWD/build/ios/ipa"
          cp -f "$ABS_IPA" "$ROOT/build/ios/ipa/"
          cp -f "$ABS_IPA" "$FLUTTER_PWD/build/ios/ipa/"
          echo "IPA: $ABS_IPA"
          echo "Copias para artefactos: $ROOT/build/ios/ipa/ e $FLUTTER_PWD/build/ios/ipa/"
          ls -la "$ROOT/build/ios/ipa" "$FLUTTER_PWD/build/ios/ipa"
      # O publicador ASC da Codemagic procura *.ipa nos artefactos; em monorepo o IPA fica
      # em flutter_app/build/ios/ipa/ (ou $FLUTTER_BUILD_DIR). Copiar para build/ios/ipa na raiz.
      - name: IPA para publicação ASC (cópia na raiz do repo)
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          LAYOUT="$(cat /tmp/cm_yw_layout)"
          FPROOT="$ROOT"
          [ "$LAYOUT" = mono ] && FPROOT="$ROOT/flutter_app"
          mkdir -p build/ios/ipa
          BD="${FLUTTER_BUILD_DIR:-build}"
          if [ "${BD#/}" != "$BD" ]; then
            CLASSIC_IPA_DIR="$BD/ios/ipa"
          else
            CLASSIC_IPA_DIR="$FPROOT/$BD/ios/ipa"
          fi
          # O passo anterior ja copia para build/ios/ipa — so validar e completar fallbacks.
          if find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f -print -quit 2>/dev/null | grep -q .; then
            echo "OK: .ipa ja presente em build/ios/ipa (passo Flutter build IPA)."
            ls -la build/ios/ipa/
            exit 0
          fi
          rm -f build/ios/ipa/*.ipa 2>/dev/null || true
          COPIED=0
          for marker in "$ROOT/.cm_yw_last_ipa_path" "$FPROOT/.cm_last_ipa_path"; do
            if [ ! -f "$marker" ]; then
              continue
            fi
            IPA_FILE="$(tr -d '\r\n' < "$marker" | head -n 1)"
            if [ -n "$IPA_FILE" ] && [ -f "$IPA_FILE" ]; then
              cp -f "$IPA_FILE" build/ios/ipa/
              COPIED=1
              echo "Copiado via $marker: $IPA_FILE"
              break
            fi
            echo "AVISO: $marker invalido ou ficheiro ausente: ${IPA_FILE:-<vazio>}"
          done
          if [ "$COPIED" -eq 0 ] && [ -d "$CLASSIC_IPA_DIR" ]; then
            find "$CLASSIC_IPA_DIR" -maxdepth 1 -name "*.ipa" -type f -exec cp -f {} build/ios/ipa/ \;
            if find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f -print -quit 2>/dev/null | grep -q .; then
              COPIED=1
            fi
          fi
          for extra in "$FPROOT/build/ios/ipa" "$ROOT/flutter_app/build/ios/ipa" "$ROOT/build/ios/ipa"; do
            if [ "$COPIED" -ne 0 ]; then
              break
            fi
            if [ ! -d "$extra" ]; then
              continue
            fi
            find "$extra" -maxdepth 1 -name "*.ipa" -type f -exec cp -f {} build/ios/ipa/ \;
            if find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f -print -quit 2>/dev/null | grep -q .; then
              COPIED=1
              echo "Copiado de $extra"
            fi
          done
          if [ "$COPIED" -eq 0 ]; then
            echo "Fallback: a procurar .ipa no clone (excl. .git) ..."
            find "$ROOT" -name "*.ipa" -type f -not -path "*/.git/*" 2>/dev/null | head -20 > /tmp/cm_ipa_list.txt
            if [ ! -s /tmp/cm_ipa_list.txt ]; then
              echo "ERRO: nenhum .ipa em flutter_app/build/ios/ipa nem na raiz (export falhou ou caminho mudou)."
              echo "  Use codemagic.yaml deste repositorio (Team app > Configuration file from repository)."
              echo "  CM_BUILD_DIR=$ROOT LAYOUT=$LAYOUT CLASSIC_IPA_DIR=$CLASSIC_IPA_DIR"
              find "$ROOT" -name "*.ipa" -not -path "*/.git/*" 2>/dev/null | head -30 || true
              ls -la "$FPROOT/build/ios" 2>/dev/null || true
              ls -la "$ROOT/build/ios" 2>/dev/null || true
              exit 1
            fi
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              cp -f "$f" build/ios/ipa/
            done < /tmp/cm_ipa_list.txt
          fi
          echo "IPAs prontos para artefactos / App Store Connect:"
          ls -la build/ios/ipa/
          ls -la "$CLASSIC_IPA_DIR" 2>/dev/null || true
          # Alguns passos / publicadores procuram *.ipa na raiz do clone — copiar também para ROOT.
          if find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f -print -quit 2>/dev/null | grep -q .; then
            find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f -exec cp -f {} "$ROOT/" \;
            echo "Copia para raiz do workspace ($ROOT):"
            ls -la "$ROOT"/*.ipa 2>/dev/null || true
          fi
      - name: Firebase App Distribution (FIREBASE_SERVICE_ACCOUNT_JSON)
        script: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON vazio - a saltar App Distribution."
            exit 0
          fi
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          IPA=""
          BD="${FLUTTER_BUILD_DIR:-build}"
          for cand in build/ios/ipa/*.ipa "flutter_app/$BD/ios/ipa/"*.ipa flutter_app/build/ios/ipa/*.ipa "$BD/ios/ipa/"*.ipa; do
            if [ -f "$cand" ]; then IPA="$cand"; break; fi
          done
          if [ -z "$IPA" ]; then
            IPA=$(find "$ROOT" -name "*.ipa" -type f -not -path "*/.git/*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$IPA" ] || [ ! -f "$IPA" ]; then
            echo "ERRO: nenhum .ipa para App Distribution."
            find "$ROOT" -name "*.ipa" -not -path "*/.git/*" 2>/dev/null | head -20 || true
            exit 1
          fi
          echo "App Distribution IPA: $IPA"
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          npm install -g firebase-tools@13
          NOTES="Gestao YAHWEH CI build ${CM_BUILD_NUMBER:-?}"
          if [ -n "${APP_VERSION_SECRET:-}" ]; then
            NOTES="$APP_VERSION_SECRET"
          fi
          firebase appdistribution:distribute "$IPA" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "$FIREBASE_APP_DISTRIBUTION_GROUPS" \
            --release-notes "$NOTES"
      # Upload real ao App Store Connect: o bloco publishing.app_store_connect da Codemagic
      # por vezes termina em <1s (sem IPA nos artefactos esperados / env PEM no pos-processamento).
      # Este passo usa a mesma CLI dos comandos keychain/xcode-project e --path explícito.
      - name: Enviar IPA ao App Store Connect (app-store-connect publish)
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Grupo appstore_credentials: APP_STORE_CONNECT_ISSUER_ID}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Grupo appstore_credentials: APP_STORE_CONNECT_KEY_IDENTIFIER (Key ID)}"
          if [ ! -f /tmp/_asc_ok.pem ]; then
            echo "ERRO: /tmp/_asc_ok.pem ausente — o passo JWT deve correr antes e criar a chave API."
            exit 1
          fi
          IPA=""
          BD="${FLUTTER_BUILD_DIR:-build}"
          for cand in build/ios/ipa/*.ipa "flutter_app/$BD/ios/ipa/"*.ipa flutter_app/build/ios/ipa/*.ipa "$BD/ios/ipa/"*.ipa; do
            if [ -f "$cand" ]; then IPA="$cand"; break; fi
          done
          if [ -z "$IPA" ]; then
            IPA=$(find "$ROOT" -name "*.ipa" -not -path "*/.git/*" 2>/dev/null | head -n 1)
          fi
          if [ -z "$IPA" ] || [ ! -f "$IPA" ]; then
            echo "ERRO: nenhum .ipa encontrado para publicar."
            find "$ROOT" -name "*.ipa" -not -path "*/.git/*" 2>/dev/null || true
            exit 1
          fi
          echo "=== app-store-connect publish ==="
          echo "IPA: $IPA ($(wc -c < "$IPA" | tr -d ' ') bytes)"
          if ! command -v app-store-connect >/dev/null 2>&1; then
            echo "A instalar codemagic-cli-tools (app-store-connect)..."
            python3 -m pip install --user -q codemagic-cli-tools
            export PATH="$(python3 -m site --user-base)/bin:$PATH"
          fi
          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:/tmp/_asc_ok.pem" \
            --path "$IPA" \
            --testflight \
            --expire-build-submitted-for-review \
            --max-find-build-wait 30 \
            --max-build-processing-wait 45
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - "*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - raihom@gmail.com
        notify:
          success: true
          failure: true
      # Envio ao ASC + submit TestFlight: passo de script "Enviar IPA ao App Store Connect".
      # (O bloco app_store_connect aqui foi removido para evitar upload fantasma <1s.)
      #
      # LOJA App Store publica: no ASC, apos build em TestFlight — "Preparar para envio" +
      # metadata (capturas, privacidade, etc.) + enviar revisao. Opcional no YAML antigo:
      # submit_to_app_store: true (só com ficha completa).

# Android AAB local: .\scripts\build_android_play_store_aab.ps1
