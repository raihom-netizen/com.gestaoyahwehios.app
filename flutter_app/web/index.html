    <!-- HLS (m3u8) para vídeo adaptativo no feed web — [PremiumHtmlFeedVideo] -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script>
      (function () {
        window.yahwehDetachHls = function (video) {
          if (!video) return;
          try {
            if (video._yahwehHls) {
              video._yahwehHls.destroy();
              video._yahwehHls = null;
            }
          } catch (e) {}
        };
        window.yahwehAttachHls = function (video, src) {
          if (!video || !src) return;
          var s = String(src);
          window.yahwehDetachHls(video);
          if (s.toLowerCase().indexOf('.m3u8') === -1 && s.indexOf('m3u8') === -1) {
            video.src = s;
            video.load();
            return;
          }
          if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            var hls = new Hls({
              enableWorker: true,
              lowLatencyMode: true,
              maxBufferLength: 30,
              backBufferLength: 30
            });
            hls.loadSource(s);
            hls.attachMedia(video);
            video._yahwehHls = hls;
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = s;
            video.load();
          } else {
            video.src = s;
            video.load();
          }
        };
      })();
    </script>

    <script>
      (function () {
        // Remove service worker antigo para que o usuário sempre carregue a versão nova após deploy.
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          });
        }
        var GYH_STORAGE_KEY = 'gyh_server_version';
        function checkVersionAndStore() {
          fetch('version.json?t=' + Date.now(), { cache: 'no-store' }).then(function (res) { return res.json(); }).then(function (data) {
            var v = (data.version || data.build_number || '').toString();
            if (v) localStorage.setItem(GYH_STORAGE_KEY, v);
          }).catch(function () {});
        }
        setInterval(checkVersionAndStore, 60000);
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') checkVersionAndStore();
        });
        setTimeout(checkVersionAndStore, 8000);
      })();
    </script>

    <script>
      (function () {
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          deferredPrompt = e;
        });

        window.addEventListener('appinstalled', function () {
          deferredPrompt = null;
        });

        window.gyhPwa = {
          canInstall: function () {
            return !!deferredPrompt;
          },
          promptInstall: async function () {
            if (!deferredPrompt) return false;
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            deferredPrompt = null;
            return result && result.outcome === 'accepted';
          }
        };

        // Compatibilidade com integrações anteriores
        window.isPwaInstallAvailable = function () {
          return window.gyhPwa.canInstall();
        };

        window.triggerPwaInstall = function () {
          return window.gyhPwa.promptInstall();
        };
      })();
    </script>
    <title>Gestão Yahweh - Igrejas</title>
    <base href="/" />
