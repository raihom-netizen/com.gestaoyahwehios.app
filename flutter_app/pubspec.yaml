name: gestao_yahweh
description: Gestao YAHWEH - Onboarding + Trial 30 dias + Planos (starter)
publish_to: "none"
# Alinhado com lib/app_version.dart; scripts/bump_version.ps1 atualiza os dois.
# App Store: cada IPA precisa de build (+N) unico; se der 409, incrementar +N.
version: 11.2.295+1834

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fl_chart: ^0.64.0
  table_calendar: ^3.1.2

  firebase_core: ^3.15.0
  firebase_auth: ^5.7.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  cloud_firestore: ^5.6.0
  cloud_functions: ^5.1.3
  firebase_storage: ^12.4.0
  # --- Mídia, biometria e PDF (manual arquitetural §7) ---
  image_picker: ^1.2.2
  image_cropper: ^8.1.0
  flutter_image_compress: ^2.1.0
  image: ^4.5.4
  video_compress: ^3.1.2
  local_auth: ^2.3.0
  printing: ^5.14.3
  pdf: ^3.12.0
  qr_flutter: ^4.1.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.3
  # Feature flagging para conformidade da App Store: chave `exibir_pagamento_ios`
  # controla se o app mostra UI/links de pagamento direto (Mercado Pago) em iOS.
  # Padrao = false: app se comporta como "Reader/SaaS" exigido pela Apple (Guideline 3.1.1).
  firebase_remote_config: ^5.4.0
  shared_preferences: ^2.3.2
  # Offline-first: fila de sincronização local (Fase 2 — migração gradual).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  intl: ^0.20.2
  timezone: ^0.11.0
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  share_plus: ^10.1.4
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  visibility_detector: ^0.4.0+2
  add_2_calendar: ^3.0.1
  cached_network_image: ^3.4.1
  path_provider: ^2.1.2
  path: ^1.9.0
  video_player: ^2.9.2

  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_fonts: ^6.2.1
  webview_flutter: ^4.10.0
  window_manager: ^0.5.1
  chewie: ^1.13.0
  crop_your_image: ^2.0.0
  archive: ^4.0.9
  open_filex: ^4.7.0
  file_picker: ^10.3.10
  flutter_secure_storage: ^10.0.0
  skeletonizer: ^2.1.3
  percent_indicator: ^4.2.3
  flutter_local_notifications: ^21.0.0
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.1
  flutter_cache_manager: ^3.4.1
  firebase_crashlytics: ^4.3.10
  firebase_performance: ^0.10.1+10
  screenshot: ^3.0.0
  gal: ^2.3.2
  flutter_staggered_grid_view: ^0.7.0
  font_awesome_flutter: ^11.0.0
  connectivity_plus: ^7.1.0
  flutter_linkify: ^6.0.0
  flutter_staggered_animations: ^1.1.1
  # Sincronizado com Controle Total: colar print (imagem) na ?rea de transfer?ncia em Android/iOS/desktop.
  # Extrato / fatura PDF (texto embutido) ? alinhado ao Controle Total
  pdfrx: ^2.2.24
  flutter_quill: ^11.5.1
  record: ^6.2.0
  emoji_picker_flutter: ^4.4.0
  just_audio: ^0.10.5
  audio_waveforms: ^2.0.2
  package_info_plus: ^8.3.0
flutter:
  # Flutter 3.44+ SPM nao instala Pods/FirebaseCrashlytics/run — obrigatorio para Crashlytics no CI.
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/LOGO_GESTAO_YAHWEH.png
    - assets/images/banks/
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/fonts/Roboto-Italic.ttf
    - assets/fonts/GreatVibes-Regular.ttf
    - assets/fonts/UnifrakturMaguntia-Book.ttf
    - assets/fonts/CinzelDecorative-Regular.ttf
    - assets/fonts/PinyonScript-Regular.ttf
    - assets/fonts/LibreBaskerville-Variable.ttf


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#0C3B8A"
  windows:
    generate: true
    image_path: assets/icon/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icon/app_icon.png



















