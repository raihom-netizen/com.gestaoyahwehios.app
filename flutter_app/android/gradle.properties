org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Evita falhas/travamentos de cache incremental Kotlin em Windows com plugins pub em roots diferentes.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
# 16K page size (alvo API 35+ / Play 2025): NDK r28+ e AGP 8.5.1+ em android/app e settings;
# se a Play apontar uma .so ainda 4K, actualize o plugin a que pertence. developer.android.com/guide/practices/page-sizes
