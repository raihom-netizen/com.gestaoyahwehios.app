# Codemagic — Flutter na RAIZ do clone quando o directório da aplicação é flutter_app/.
# Assinatura: CM_CERTIFICATE + CM_PROVISIONING_PROFILE (Base64) — ver ../codemagic.yaml.
# Preferir ../codemagic.yaml (monorepo): inclui deteção mono/root, iOS deployment 14 e scripts extra.
# Runner.entitlements sem Sign In with Apple — perfil App Store sem essa capability assina o IPA.

workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - ios/Pods
        - $HOME/Library/Caches/CocoaPods
    environment:
      groups:
        - appstore_credentials
      vars:
        APP_STORE_APPLE_ID: 6761656626
        FIREBASE_IOS_APP_ID: "1:157235497908:ios:5c2a89577e79e39b4ac8e1"
        FIREBASE_APP_DISTRIBUTION_GROUPS: "testers"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Verificar variaveis Apple (API + assinatura)
        script: |
          set -e
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?APP_STORE_CONNECT_PRIVATE_KEY (.p8)}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Key ID}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Issuer UUID}"
          : "${CM_CERTIFICATE:?CM_CERTIFICATE (P12 Apple Distribution Base64)}"
          : "${CM_PROVISIONING_PROFILE:?CM_PROVISIONING_PROFILE (perfil App Store Base64)}"
          _CM_PROV_COMPACT="$(printf '%s' "${CM_PROVISIONING_PROFILE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_PROV_COMPACT}" ]; then
            echo "ERRO: CM_PROVISIONING_PROFILE vazio apos normalizar."
            exit 1
          fi
          if ! printf '%s' "${_CM_PROV_COMPACT}" | base64 -D > /tmp/_cm_verify_prov.bin 2>/tmp/_cm_verify_prov.err; then
            echo "ERRO: CM_PROVISIONING_PROFILE nao e Base64 valido."
            cat /tmp/_cm_verify_prov.err 2>/dev/null || true
            echo "Mac: base64 -i perfil.mobileprovision | tr -d '\n' | pbcopy"
            exit 1
          fi
          [ -s /tmp/_cm_verify_prov.bin ] || { echo "ERRO: provisioning decodificado vazio."; exit 1; }
          _CM_P12_COMPACT="$(printf '%s' "${CM_CERTIFICATE}" | tr -d '\n\r\t ')"
          [ -n "${_CM_P12_COMPACT}" ] || { echo "ERRO: CM_CERTIFICATE vazio apos normalizar."; exit 1; }
          if ! printf '%s' "${_CM_P12_COMPACT}" | base64 -D > /tmp/_cm_verify_p12.bin 2>/tmp/_cm_verify_p12.err; then
            echo "ERRO: CM_CERTIFICATE nao e Base64 valido."
            cat /tmp/_cm_verify_p12.err 2>/dev/null || true
            exit 1
          fi
          [ -s /tmp/_cm_verify_p12.bin ] || { echo "ERRO: P12 decodificado vazio."; exit 1; }
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          source "$ROOT/scripts/codemagic_ios_p12_password_helpers.sh"
          echo "A verificar senha do P12 (fail-fast)..."
          if ! codemagic_verify_p12_opens_with_password /tmp/_cm_verify_p12.bin /tmp/_early_p12.err; then
            echo "ERRO: CM_CERTIFICATE_PASSWORD nao abre o P12. Use a senha do export Keychain ou CERTIFICATE_PASSWORD (alias)."
            cat /tmp/_early_p12.err 2>/dev/null || true
            exit 1
          fi
          echo "OK: P12 + provisioning Base64 validos (prov=$(wc -c < /tmp/_cm_verify_prov.bin) p12=$(wc -c < /tmp/_cm_verify_p12.bin) bytes); senha P12 OK."
      - name: JWT App Store Connect + keychain P12 e perfil App Store
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          echo "CM_IOS_SIGNING_REV=2026-04-no-export-pem-persist-end-FLUTTER-ROOT"
          _secret_to_pem_file() {
            local val="$1"
            local out="$2"
            printf '%b' "$val" | tr -d '\r' | perl -0777 -pe 's/^\xEF\xBB\xBF//; s/\A"(.*)"\z/$1/s; s/\A'\''(.*)'\''\z/$1/s' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "$out"
          }
          _looks_like_pem_api() { grep -qE 'BEGIN (EC )?PRIVATE KEY|BEGIN PRIVATE KEY' "$1"; }
          _norm_api() {
            _secret_to_pem_file "${APP_STORE_CONNECT_PRIVATE_KEY}" /tmp/_asc_raw.pem
            if [ ! -s /tmp/_asc_raw.pem ]; then
              echo "ERRO: APP_STORE_CONNECT_PRIVATE_KEY vazio apos normalizar."
              exit 1
            fi
            if _looks_like_pem_api /tmp/_asc_raw.pem; then
              cat /tmp/_asc_raw.pem > /tmp/_asc_ok.pem
            elif base64 -D < /tmp/_asc_raw.pem > /tmp/_asc_dec.pem 2>/tmp/_asc_b64.err && [ -s /tmp/_asc_dec.pem ] && _looks_like_pem_api /tmp/_asc_dec.pem; then
              cat /tmp/_asc_dec.pem > /tmp/_asc_ok.pem
            else
              echo "ERRO: APP_STORE_CONNECT_PRIVATE_KEY nao e PEM .p8 valido nem Base64 de PEM."
              [ -s /tmp/_asc_b64.err ] && cat /tmp/_asc_b64.err
              exit 1
            fi
            unset APP_STORE_CONNECT_PRIVATE_KEY || true
          }
          _persist_asc_pem_to_cm_env() {
            [ -n "${CM_ENV:-}" ] && [ -f /tmp/_asc_ok.pem ] || return 0
            _ASC_DELIM="CMGYYWHASCPEM594E2F1END"
            {
              echo "APP_STORE_CONNECT_PRIVATE_KEY<<${_ASC_DELIM}"
              cat /tmp/_asc_ok.pem
              printf '\n%s\n' "${_ASC_DELIM}"
            } >> "$CM_ENV"
          }
          _norm_api
          keychain initialize
          _CM_PROV_COMPACT="$(printf '%s' "${CM_PROVISIONING_PROFILE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_PROV_COMPACT}" ]; then
            echo "ERRO: CM_PROVISIONING_PROFILE vazio. cat perfil.mobileprovision | base64 | pbcopy"
            exit 1
          fi
          if ! printf '%s' "${_CM_PROV_COMPACT}" | base64 -D > /tmp/cm_raw.mobileprovision 2>/tmp/_prov_b64.err; then
            echo "ERRO: CM_PROVISIONING_PROFILE Base64 invalido."
            cat /tmp/_prov_b64.err 2>/dev/null || true
            echo "Regrave o secret: Base64 do .mobileprovision (binario), uma linha."
            exit 1
          fi
          if [ ! -s /tmp/cm_raw.mobileprovision ]; then
            echo "ERRO: perfil decodificado vazio."
            exit 1
          fi
          security cms -D -i /tmp/cm_raw.mobileprovision > /tmp/cm_prov.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /tmp/cm_prov.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /tmp/cm_prov.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' /tmp/cm_prov.plist)
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp /tmp/cm_raw.mobileprovision "${PROFILES_HOME}/${PROFILE_UUID}.mobileprovision"
          _CM_P12_COMPACT="$(printf '%s' "${CM_CERTIFICATE}" | tr -d '\n\r\t ')"
          if [ -z "${_CM_P12_COMPACT}" ]; then
            echo "ERRO: CM_CERTIFICATE vazio. cat AppleDistribution.p12 | base64 | pbcopy"
            exit 1
          fi
          if ! printf '%s' "${_CM_P12_COMPACT}" | base64 -D > /tmp/cm_distribution.p12 2>/tmp/_p12_b64.err; then
            echo "ERRO: CM_CERTIFICATE Base64 invalido."
            cat /tmp/_p12_b64.err 2>/dev/null || true
            exit 1
          fi
          if [ ! -s /tmp/cm_distribution.p12 ]; then
            echo "ERRO: P12 decodificado vazio."
            exit 1
          fi
          source "$ROOT/scripts/codemagic_ios_p12_password_helpers.sh"
          codemagic_normalize_p12_password_from_env
          if ! codemagic_verify_p12_opens_with_password /tmp/cm_distribution.p12 /tmp/_p12_openssl.err; then
            echo "ERRO: CM_CERTIFICATE_PASSWORD nao abre o P12 (ou use CERTIFICATE_PASSWORD com o mesmo valor)."
            cat /tmp/_p12_openssl.err 2>/dev/null || true
            exit 1
          fi
          if [ -z "${CM_CERTIFICATE_PASSWORD:-}" ]; then
            keychain add-certificates --certificate /tmp/cm_distribution.p12
          else
            keychain add-certificates --certificate /tmp/cm_distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          fi
          export CM_EXPORT_PROFILE_NAME="$PROFILE_NAME"
          export CM_EXPORT_TEAM_ID="$TEAM_ID"
          python3 << 'PY'
          import os, plistlib
          team = os.environ["CM_EXPORT_TEAM_ID"]
          name = os.environ["CM_EXPORT_PROFILE_NAME"]
          data = {
              "method": "app-store",
              "signingStyle": "manual",
              "teamID": team,
              "uploadSymbols": True,
              "provisioningProfiles": {"com.gestaoyahwehios.app": name},
          }
          with open("/tmp/ExportOptions.plist", "wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          PY
          echo "Perfil: name=${PROFILE_NAME} uuid=${PROFILE_UUID} team=${TEAM_ID}"
          _persist_asc_pem_to_cm_env
          # Monorepo: alinhar perfil ao P12 (fetch + API) — ver scripts/codemagic_ios_install_p12_profile_exportoptions.sh na raiz.
          if [ -f "$ROOT/../scripts/codemagic_ios_fetch_profile_matching_p12.sh" ]; then
            export IOS_BUNDLE_ID="${IOS_BUNDLE_ID:-com.gestaoyahwehios.app}"
            bash "$ROOT/../scripts/codemagic_ios_fetch_profile_matching_p12.sh" || true
          fi
      - name: Verificar perfil vs P12 Distribution (fail-fast, antes do pod)
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          SCRIPT=""
          if [ -f "$ROOT/../scripts/codemagic_ios_verify_profile_matches_p12.sh" ]; then
            SCRIPT="$ROOT/../scripts/codemagic_ios_verify_profile_matches_p12.sh"
          elif [ -f "$ROOT/scripts/codemagic_ios_verify_profile_matches_p12.sh" ]; then
            SCRIPT="$ROOT/scripts/codemagic_ios_verify_profile_matches_p12.sh"
          fi
          if [ -z "$SCRIPT" ] || [ ! -f "$SCRIPT" ]; then
            echo "ERRO: codemagic_ios_verify_profile_matches_p12.sh nao encontrado (monorepo: ../scripts/)."
            exit 1
          fi
          bash "$SCRIPT"
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Code signing (Xcode)
        script: |
          set -e
          cd ios
          xcode-project use-profiles
          echo "--- Identidades de assinatura ---"
          security find-identity -v -p codesigning | head -40 || true
      - name: Flutter build IPA
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          echo "--- Re-validar perfil vs P12 (antes de flutter build ipa) ---"
          if [ -f "$ROOT/scripts/codemagic_ios_verify_profile_matches_p12.sh" ]; then
            bash "$ROOT/scripts/codemagic_ios_verify_profile_matches_p12.sh"
          elif [ -f "$ROOT/../scripts/codemagic_ios_verify_profile_matches_p12.sh" ]; then
            bash "$ROOT/../scripts/codemagic_ios_verify_profile_matches_p12.sh"
          else
            echo "AVISO: scripts/codemagic_ios_verify_profile_matches_p12.sh nao encontrado (copie scripts/ do monorepo)."
          fi
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//;s/[[:space:]]*$//')"
          BUILD_NAME="${VERSION_LINE%%+*}"
          if [ -z "$BUILD_NAME" ]; then echo "ERRO: version no pubspec"; exit 1; fi
          if [ -n "${CM_BUILD_NUMBER:-}" ]; then BN="$CM_BUILD_NUMBER"; else BN="${VERSION_LINE##*+}"; echo "AVISO: CM_BUILD_NUMBER vazio — pubspec +$BN"; fi
          [ -n "$BN" ] || BN="1"
          echo "build-name=$BUILD_NAME build-number=$BN"
          set +e
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BN" \
            --export-options-plist=/tmp/ExportOptions.plist > /tmp/cm_flutter_ipa.log 2>&1
          FL=$?
          set -e
          if [ "$FL" -ne 0 ]; then
            tail -120 /tmp/cm_flutter_ipa.log
            if grep -q "doesn't include signing certificate" /tmp/cm_flutter_ipa.log 2>/dev/null; then
              echo ""
              echo "=== DICA: Perfil App Store sem o certificado Apple Distribution do P12 (CM_CERTIFICATE)."
              echo "Atualize o perfil em developer.apple.com → Profiles → Edit → Certificates → Save → Download."
              echo "Codemagic: CM_PROVISIONING_PROFILE = Base64 do novo .mobileprovision (uma linha)."
            fi
            exit "$FL"
          fi
          IPA_PATH=""
          for trydir in build/ios/ipa "$PWD/build/ios/ipa"; do
            [ -d "$trydir" ] || continue
            IPA_PATH=$(find "$trydir" -maxdepth 1 -name "*.ipa" -type f 2>/dev/null | head -n 1)
            [ -n "$IPA_PATH" ] && [ -f "$IPA_PATH" ] && break
          done
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            ARCH=$(find build/ios -name "Runner.xcarchive" -type d 2>/dev/null | head -n 1)
            if [ -n "$ARCH" ]; then
              mkdir -p build/ios/ipa
              set +e
              xcodebuild -exportArchive -archivePath "$ARCH" -exportPath build/ios/ipa -exportOptionsPlist /tmp/ExportOptions.plist
              set -e
              IPA_PATH=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f 2>/dev/null | head -n 1)
            fi
          fi
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "ERRO: sem .ipa apos flutter build ipa + fallback."
            find . -name "*.ipa" -type f 2>/dev/null | head -20 || true
            tail -80 /tmp/cm_flutter_ipa.log || true
            exit 1
          fi
          echo "IPA OK: $IPA_PATH"
      - name: IPA na raiz do clone (artefactos)
        script: |
          set -e
          ROOT="${CM_BUILD_DIR:-${FCI_BUILD_DIR:-$(pwd)}}"
          cd "$ROOT"
          mkdir -p build/ios/ipa
          if [ -d build/ios/ipa ]; then
            find build/ios/ipa -maxdepth 1 -name "*.ipa" -type f -exec cp -f {} "$ROOT/" \; 2>/dev/null || true
          fi
          for f in build/ios/ipa/*.ipa; do [ -f "$f" ] && cp -f "$f" "$ROOT/" && break; done
          ls -la "$ROOT"/*.ipa 2>/dev/null || ls -la build/ios/ipa/ || true
      - name: Firebase App Distribution (FIREBASE_SERVICE_ACCOUNT_JSON)
        script: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON vazio - a saltar."
            exit 0
          fi
          IPA=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -z "$IPA" ]; then echo "Nenhum .ipa"; exit 1; fi
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          npm install -g firebase-tools@13
          NOTES="Gestao YAHWEH CI ${CM_BUILD_NUMBER:-?}"
          [ -n "${APP_VERSION_SECRET:-}" ] && NOTES="$APP_VERSION_SECRET"
          firebase appdistribution:distribute "$IPA" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "$FIREBASE_APP_DISTRIBUTION_GROUPS" \
            --release-notes "$NOTES"
    artifacts:
      - build/ios/ipa/*.ipa
      - "*.ipa"
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - raihom@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        # beta_groups: [ NomeExactoGrupoTestFlight ]
