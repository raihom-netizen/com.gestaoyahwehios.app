# Codemagic — Flutter na RAIZ do repo (sem pasta flutter_app nos scripts).
# Ver ../codemagic.yaml no monorepo para comentarios completos (ios_signing automatico).

workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      # No matching profiles: ver IOS/README_CREDENCIAIS.txt — perfil App Store na equipa
      # ou provisioning_profiles/certificates por Reference name (doc Codemagic signing-ios).
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gestaoyahwehios.app
      vars:
        APP_STORE_APPLE_ID: 6761656626
        FIREBASE_IOS_APP_ID: "1:157235497908:ios:5c2a89577e79e39b4ac0e1"
        FIREBASE_APP_DISTRIBUTION_GROUPS: "testers"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Verificar variaveis Apple (API + assinatura)
        script: |
          set -e
          : "${APP_STORE_CONNECT_PRIVATE_KEY:?APP_STORE_CONNECT_PRIVATE_KEY (.p8)}"
          : "${APP_STORE_CONNECT_KEY_IDENTIFIER:?Key ID}"
          : "${APP_STORE_CONNECT_ISSUER_ID:?Issuer UUID}"
          if [ -n "${CM_CERTIFICATE:-}" ]; then
            : "${CM_PROVISIONING_PROFILE:?CM_PROVISIONING_PROFILE Base64}"
            echo "Override: CM_CERTIFICATE — P12 manual."
          else
            echo "Assinatura: ios_signing app_store + com.gestaoyahwehios.app (equipa Codemagic)."
          fi
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: JWT App Store Connect + keychain opcional P12
        script: |
          set -e
          echo "CM_IOS_SIGNING_REV=2026-04-team-ios_signing-native-FLUTTER-ROOT"
          _secret_to_pem_file() {
            local val="$1"
            local out="$2"
            printf '%b' "$val" | tr -d '\r' | perl -0777 -pe 's/^\xEF\xBB\xBF//; s/\A"(.*)"\z/$1/s; s/\A'\''(.*)'\''\z/$1/s' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "$out"
          }
          _looks_like_pem_api() { grep -qE 'BEGIN (EC )?PRIVATE KEY|BEGIN PRIVATE KEY' "$1"; }
          _norm_api() {
            _secret_to_pem_file "${APP_STORE_CONNECT_PRIVATE_KEY}" /tmp/_asc_raw.pem
            if _looks_like_pem_api /tmp/_asc_raw.pem; then
              cat /tmp/_asc_raw.pem > /tmp/_asc_ok.pem
            elif base64 -D < /tmp/_asc_raw.pem > /tmp/_asc_dec.pem 2>/dev/null && _looks_like_pem_api /tmp/_asc_dec.pem; then
              cat /tmp/_asc_dec.pem > /tmp/_asc_ok.pem
            else
              echo "ERRO: APP_STORE_CONNECT_PRIVATE_KEY invalido."
              exit 1
            fi
            export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/_asc_ok.pem)"
          }
          _persist_asc_pem_to_cm_env() {
            [ -n "${CM_ENV:-}" ] && [ -f /tmp/_asc_ok.pem ] || return 0
            {
              echo 'APP_STORE_CONNECT_PRIVATE_KEY<<CM_YAHWEH_ASC_PEM'
              cat /tmp/_asc_ok.pem
              echo 'CM_YAHWEH_ASC_PEM'
            } >> "$CM_ENV"
          }
          _norm_api
          _persist_asc_pem_to_cm_env
          if [ -n "${CM_CERTIFICATE:-}" ]; then
            keychain initialize
            PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$PROFILES_HOME"
            PROFILE_PATH="$(mktemp "$PROFILES_HOME"/cm_XXXXXX.mobileprovision)"
            printf '%s' "${CM_PROVISIONING_PROFILE}" | tr -d '\n\r ' | base64 -D > "$PROFILE_PATH"
            printf '%s' "${CM_CERTIFICATE}" | tr -d '\n\r ' | base64 -D > /tmp/cm_distribution.p12
            if [ -z "${CM_CERTIFICATE_PASSWORD:-}" ]; then
              keychain add-certificates --certificate /tmp/cm_distribution.p12
            else
              keychain add-certificates --certificate /tmp/cm_distribution.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
            fi
          fi
      - name: Code signing (Xcode)
        script: |
          cd ios
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Firebase App Distribution (FIREBASE_SERVICE_ACCOUNT_JSON)
        script: |
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_JSON vazio - a saltar."
            exit 0
          fi
          IPA=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -z "$IPA" ]; then echo "Nenhum .ipa"; exit 1; fi
          printf '%s\n' "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
          npm install -g firebase-tools@13
          NOTES="Gestao YAHWEH CI ${CM_BUILD_NUMBER:-?}"
          [ -n "${APP_VERSION_SECRET:-}" ] && NOTES="$APP_VERSION_SECRET"
          firebase appdistribution:distribute "$IPA" \
            --app "$FIREBASE_IOS_APP_ID" \
            --groups "$FIREBASE_APP_DISTRIBUTION_GROUPS" \
            --release-notes "$NOTES"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - raihom@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
