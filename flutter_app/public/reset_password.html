<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redefinir senha — Gestão YAHWEH</title>

  <style>
    :root{
      --primary:#1c4f9c;
      --bg:#f6f8fc;
      --card:#ffffff;
      --muted:#6b7280;
      --border:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:18px;
    }
    .wrap{
      width:100%;
      max-width:900px;
      display:grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap:18px;
    }
    .brand{
      background: #eef3ff;
      border:1px solid var(--border);
      border-radius:20px;
      padding:26px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-height:420px;
    }
    .brand img{
      max-width:520px;
      width:100%;
      height:auto;
      display:block;
      margin:0 auto 14px auto;
    }
    .brand p{
      margin:0;
      color: var(--muted);
      text-align:center;
      line-height:1.4;
      font-size:16px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:22px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.08);
      min-height:420px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    h1{
      margin:0 0 6px 0;
      font-size:26px;
      font-weight:900;
      text-align:center;
    }
    .sub{
      margin:0 0 18px 0;
      color:var(--muted);
      text-align:center;
      font-size:14px;
    }
    label{
      display:block;
      font-weight:700;
      margin:10px 0 6px;
      font-size:14px;
    }
    input{
      width:100%;
      padding:12px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      outline:none;
      font-size:15px;
    }
    input:focus{
      border-color: rgba(28,79,156,.45);
      box-shadow: 0 0 0 4px rgba(28,79,156,.12);
    }
    .btn{
      margin-top:14px;
      width:100%;
      height:46px;
      border:0;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }
    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .msg{
      margin-top:12px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#f9fafb;
      color:#0f172a;
      font-size:14px;
      display:none;
      white-space:pre-line;
    }
    .ok{ border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.10); }
    .err{ border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.10); }

    .footer{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
    }

    @media (max-width: 860px){
      .wrap{ grid-template-columns:1fr; }
      .brand{ min-height:auto; }
      .card{ min-height:auto; }
    }
  </style>

  <script defer src="/__/firebase/10.12.2/firebase-app-compat.js"></script>
  <script defer src="/__/firebase/10.12.2/firebase-auth-compat.js"></script>
  <script defer src="/__/firebase/init.js"></script>
</head>

<body>
  <div class="wrap">
    <section class="brand">
      <img src="/assets/logo.png" alt="Gestão YAHWEH" />
      <p>Sistema simples, prático e confiável, feito para sua igreja.</p>
    </section>

    <section class="card">
      <h1>DIGITE SUA NOVA SENHA</h1>
      <p class="sub">Crie uma nova senha para acessar o Gestão YAHWEH.</p>

      <label for="pass1">Nova senha</label>
      <input id="pass1" type="password" placeholder="Mínimo 6 caracteres" />

      <label for="pass2">Confirmar nova senha</label>
      <input id="pass2" type="password" placeholder="Repita a senha" />

      <button id="btnSave" class="btn">SALVAR</button>

      <div id="msg" class="msg"></div>
      <div class="footer">© Gestão YAHWEH</div>
    </section>
  </div>

  <script>
    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function showMsg(text, type){
      const el = document.getElementById('msg');
      el.style.display = 'block';
      el.classList.remove('ok','err');
      el.classList.add(type === 'ok' ? 'ok' : 'err');
      el.textContent = text;
    }

    async function main(){
      const mode = qs('mode');
      const oobCode = qs('oobCode');

      if (mode !== 'resetPassword' || !oobCode){
        showMsg('Link inválido ou incompleto.\nSolicite novamente a redefinição de senha.', 'err');
        document.getElementById('btnSave').disabled = true;
        return;
      }

      const waitFirebase = () => new Promise((res) => {
        const t = setInterval(() => {
          if (window.firebase && firebase.auth) { clearInterval(t); res(); }
        }, 50);
      });
      await waitFirebase();

      try{
        await firebase.auth().verifyPasswordResetCode(oobCode);
      }catch(e){
        showMsg('Este link expirou ou já foi usado.\nSolicite um novo link em "Esqueci a senha".', 'err');
        document.getElementById('btnSave').disabled = true;
        return;
      }

      const btn = document.getElementById('btnSave');
      btn.addEventListener('click', async () => {
        const p1 = document.getElementById('pass1').value.trim();
        const p2 = document.getElementById('pass2').value.trim();

        if (p1.length < 6){
          showMsg('A senha deve ter no mínimo 6 caracteres.', 'err');
          return;
        }
        if (p1 !== p2){
          showMsg('As senhas não conferem. Digite novamente.', 'err');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'SALVANDO...';

        try{
          await firebase.auth().confirmPasswordReset(oobCode, p1);
          showMsg('Senha redefinida com sucesso ✅\nAgora você pode voltar ao app e entrar normalmente.', 'ok');
          btn.textContent = 'SALVO ✅';
        }catch(e){
          showMsg('Não foi possível salvar a nova senha.\nTente novamente ou solicite outro link.', 'err');
          btn.disabled = false;
          btn.textContent = 'SALVAR';
        }
      });
    }
    main();
  </script>
</body>
</html>
