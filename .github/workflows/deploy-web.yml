# Build da versão web. Para deploy: configure FIREBASE_TOKEN e descomente o step de deploy.
name: Build Web

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build web
        run: cd flutter_app && flutter build web --release --no-tree-shake-icons

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: flutter_app/build/web
